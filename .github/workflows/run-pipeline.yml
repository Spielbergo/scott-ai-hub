name: Run Market Trends Pipeline

on:
  workflow_dispatch:
    inputs:
      triggered_by:
        description: Who triggered this run
        default: dashboard
        required: false

  schedule:
    # Every Monday at 8 AM UTC
    - cron: '0 8 * * 1'

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=""
          [ -z "$FIREBASE_SERVICE_ACCOUNT_BASE64" ] && missing="$missing FIREBASE_SERVICE_ACCOUNT_BASE64"
          [ -z "$GEMINI_API_KEY" ]                  && missing="$missing GEMINI_API_KEY"
          if [ -n "$missing" ]; then
            echo "❌ Missing required secrets:$missing"
            exit 1
          fi
          echo "✅ All required secrets present"
        env:
          FIREBASE_SERVICE_ACCOUNT_BASE64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}
          GEMINI_API_KEY:                  ${{ secrets.GEMINI_API_KEY }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run pipeline
        env:
          TRIGGERED_BY: ${{ github.event.inputs.triggered_by || 'scheduled' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT_BASE64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}
          WP_BASE_URL: ${{ secrets.WP_BASE_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
        run: node -r dotenv/config scripts/fullPipeline.js
